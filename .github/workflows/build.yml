name: Build Windows Desktop App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pywebview

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller build.spec

    - name: Prepare Artifacts
      run: |
        mkdir dist\Music_Innovation_App
        copy dist\Music_Innovation_Generator.exe dist\Music_Innovation_App\
        copy .env.example dist\Music_Innovation_App\.env
        mkdir dist\Music_Innovation_App\config
        copy config\styles.yaml dist\Music_Innovation_App\config\
      shell: cmd

    - name: Download Windows FFmpeg (Optional but Recommended)
      run: |
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
        Copy-Item "ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "dist\Music_Innovation_App\"
        Copy-Item "ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe" -Destination "dist\Music_Innovation_App\"
      shell: powershell

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4.6.1
      with:
        name: Music-Innovation-Windows-App
        path: dist/Music_Innovation_App/

  build-macos:
    runs-on: macos-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pywebview

    - name: Install create-dmg
      run: brew install create-dmg

    - name: Build APP with PyInstaller
      run: |
        pyinstaller --windowed --noconfirm build.spec

    - name: Prepare Artifacts
      run: |
        mkdir -p dist/Music_Innovation_Mac
        cp -r dist/Music_Innovation_Generator.app dist/Music_Innovation_Mac/
        cp .env.example dist/Music_Innovation_Mac/.env
        mkdir -p dist/Music_Innovation_Mac/config
        cp config/styles.yaml dist/Music_Innovation_Mac/config/

    - name: Download macOS FFmpeg (Optional but Recommended)
      run: |
        curl -L https://evermeet.cx/ffmpeg/ffmpeg-6.0.zip -o ffmpeg.zip
        curl -L https://evermeet.cx/ffmpeg/ffprobe-6.0.zip -o ffprobe.zip
        unzip -o ffmpeg.zip -d dist/Music_Innovation_Mac/
        unzip -o ffprobe.zip -d dist/Music_Innovation_Mac/

    - name: Create DMG
      run: |
        cd dist
        create-dmg \
          --volname "Music Innovation" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --app-drop-link 425 120 \
          "Music_Innovation_Mac.dmg" \
          "Music_Innovation_Mac/"

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4.6.1
      with:
        name: Music-Innovation-Mac-App
        path: dist/Music_Innovation_Mac.dmg